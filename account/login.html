<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — ZeroStick</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div id="navbar"></div>

  <section class="section">
    <div class="container" style="max-width:440px">
      <h1 style="font-size:32px;font-weight:900;margin-bottom:6px">Log In</h1>
      <p style="color:var(--text-muted);margin-bottom:36px">Welcome back. Log in to track orders and manage your account.</p>

      <form style="display:flex;flex-direction:column;gap:18px">
        <div>
          <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-muted)">Email Address</label>
          <input type="email" placeholder="you@email.com" style="width:100%;padding:13px 16px;background:var(--card-bg);border:1px solid var(--border);border-radius:4px;color:#fff;font-size:15px;outline:none" />
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <label style="font-size:13px;font-weight:600;color:var(--text-muted)">Password</label>
            <a href="#" style="font-size:13px;color:var(--accent)">Forgot password?</a>
          </div>
          <input type="password" placeholder="••••••••" style="width:100%;padding:13px 16px;background:var(--card-bg);border:1px solid var(--border);border-radius:4px;color:#fff;font-size:15px;outline:none" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:15px;margin-top:4px">Log In</button>
      </form>

      <div style="text-align:center;margin-top:28px;padding-top:28px;border-top:1px solid var(--border)">
        <p style="color:var(--text-muted);font-size:14px">Don't have an account? <a href="register.html" style="color:var(--accent);font-weight:600">Sign up</a></p>
      </div>
    </div>
  </section>

  <footer id="footer"></footer>
  <script src="../nav.js"></script>
</body>
</html>
