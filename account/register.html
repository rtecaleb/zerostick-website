<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — ZeroStick</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div id="navbar"></div>

  <section class="section">
    <div class="container" style="max-width:440px">
      <h1 style="font-size:32px;font-weight:900;margin-bottom:6px">Create Account</h1>
      <p style="color:var(--text-muted);margin-bottom:36px">Sign up to track orders, save builds, and manage your ZeroStick account.</p>

      <form style="display:flex;flex-direction:column;gap:18px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div>
            <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-muted)">First Name</label>
            <input type="text" placeholder="John" style="width:100%;padding:13px 16px;background:var(--white);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:15px;outline:none" />
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-muted)">Last Name</label>
            <input type="text" placeholder="Smith" style="width:100%;padding:13px 16px;background:var(--white);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:15px;outline:none" />
          </div>
        </div>
        <div>
          <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-muted)">Email Address</label>
          <input type="email" placeholder="you@email.com" style="width:100%;padding:13px 16px;background:var(--white);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:15px;outline:none" />
        </div>
        <div>
          <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-muted)">Password</label>
          <input type="password" placeholder="Min. 8 characters" style="width:100%;padding:13px 16px;background:var(--white);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:15px;outline:none" />
        </div>
        <div>
          <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-muted)">Confirm Password</label>
          <input type="password" placeholder="••••••••" style="width:100%;padding:13px 16px;background:var(--white);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:15px;outline:none" />
        </div>
        <div style="display:flex;align-items:flex-start;gap:10px;margin-top:4px">
          <input type="checkbox" id="marketing" style="margin-top:3px;accent-color:var(--blue)" />
          <label for="marketing" style="font-size:13px;color:var(--text-muted);cursor:pointer">Send me product updates, restocks, and exclusive offers.</label>
        </div>
        <button type="submit" class="btn btn-dark" style="width:100%;padding:14px;font-size:15px">Create Account</button>
        <p style="font-size:12px;color:var(--text-muted);text-align:center">By creating an account you agree to our <a href="#" style="color:var(--accent)">Terms of Service</a> and <a href="#" style="color:var(--accent)">Privacy Policy</a>.</p>
      </form>

      <div style="text-align:center;margin-top:28px;padding-top:28px;border-top:1px solid var(--border)">
        <p style="color:var(--text-muted);font-size:14px">Already have an account? <a href="login.html" style="color:var(--accent);font-weight:600">Log in</a></p>
      </div>
    </div>
  </section>

  <footer id="footer"></footer>
  <script src="../nav.js"></script>
</body>
</html>
